<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Three.js — Кликабельные корпуса</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        overflow: hidden;
      }
      canvas { display: block; }
      #fidget {
        position: absolute;
        top: 50%;
        right: 20px;
        transform: translateY(-50%) scale(0);
        background: rgba(255, 251, 245, 0.9);
        color: #2f261d;
        font-family: "Segoe UI", "Trebuchet MS", "Helvetica Neue", Arial, sans-serif;
        padding: 14px 18px;
        border-radius: 16px;
        border: 1px solid rgba(112, 95, 74, 0.16);
        box-shadow: 0 18px 40px rgba(49, 40, 31, 0.16);
        backdrop-filter: blur(16px);
        text-align: center;
        transition: transform 0.3s ease;
        transform-origin: right center;
      }
      #fidget.active {
        transform: translateY(-50%) scale(1);
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CZYdT6IH.js"></script>
  </head>
  <body>
    <div id="fidget">👋 Наведи курсор на объект!</div>
  </body>
</html>
